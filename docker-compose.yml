services:
  db:
    image: postgres:15-alpine
    container_name: nobonir_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nobonir
      POSTGRES_USER: nobonir
      POSTGRES_PASSWORD: nobonir
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nobonir -d nobonir"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: nobonir_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: nobonir_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings.dev
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,0.0.0.0"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      # NOTE: POSTGRES_HOST intentionally unset → dev.py uses your existing
      # backend/db.sqlite3 (mounted from the host volume below). To switch to
      # Postgres later, uncomment the block below.
      # POSTGRES_HOST: db
      # POSTGRES_PORT: "5432"
      # POSTGRES_DB: nobonir
      # POSTGRES_USER: nobonir
      # POSTGRES_PASSWORD: nobonir
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      # Live code + preserves db.sqlite3 + media/ between host and container
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: nobonir_frontend
    restart: unless-stopped
    environment:
      # Browser reaches the backend on the host-exposed port → localhost is correct
      VITE_API_URL: http://localhost:8000/api
      VITE_MEDIA_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      # Keep the container's node_modules (host mount won't clobber them)
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
