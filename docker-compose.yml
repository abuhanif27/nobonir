version: '3.8'

services:
  # Backend Service (Django)
  backend:
    build: ./backend
    container_name: nobonir_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    depends_on:
      - db
      - redis

  # Frontend Service (Vite + React)
  frontend:
    build: ./frontend
    container_name: nobonir_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend

  # Database (PostgreSQL) - Replaces SQLite for Professional Setup
  db:
    image: postgres:15-alpine
    container_name: nobonir_db
    environment:
      - POSTGRES_DB=nobonir
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Redis - For Caching and Task Queue (Celery)
  redis:
    image: redis:7-alpine
    container_name: nobonir_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
